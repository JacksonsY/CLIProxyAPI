name: ghcr

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  ghcr_amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Build Metadata
        run: |
          echo VERSION=`git describe --tags --always --dirty` >> $GITHUB_ENV
          echo COMMIT=`git rev-parse --short HEAD` >> $GITHUB_ENV
          echo BUILD_DATE=`date -u +%Y-%m-%dT%H:%M:%SZ` >> $GITHUB_ENV
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ghcr.io/cassiopeiancode/cli-proxy-api:latest-amd64
            ghcr.io/cassiopeiancode/cli-proxy-api:sha-${{ github.sha }}-amd64

  ghcr_arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Build Metadata
        run: |
          echo VERSION=`git describe --tags --always --dirty` >> $GITHUB_ENV
          echo COMMIT=`git rev-parse --short HEAD` >> $GITHUB_ENV
          echo BUILD_DATE=`date -u +%Y-%m-%dT%H:%M:%SZ` >> $GITHUB_ENV
      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ghcr.io/cassiopeiancode/cli-proxy-api:latest-arm64
            ghcr.io/cassiopeiancode/cli-proxy-api:sha-${{ github.sha }}-arm64

  ghcr_manifest:
    runs-on: ubuntu-latest
    needs:
      - ghcr_amd64
      - ghcr_arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifests
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/cassiopeiancode/cli-proxy-api:latest" \
            "ghcr.io/cassiopeiancode/cli-proxy-api:latest-amd64" \
            "ghcr.io/cassiopeiancode/cli-proxy-api:latest-arm64"
          docker buildx imagetools create \
            --tag "ghcr.io/cassiopeiancode/cli-proxy-api:sha-${{ github.sha }}" \
            "ghcr.io/cassiopeiancode/cli-proxy-api:sha-${{ github.sha }}-amd64" \
            "ghcr.io/cassiopeiancode/cli-proxy-api:sha-${{ github.sha }}-arm64"
